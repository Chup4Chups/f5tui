version: 2

project_name: f5tui

before:
  hooks:
    - go mod tidy

builds:
  - id: f5tui
    main: ./cmd/f5tui
    binary: f5tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - NOTICE
      - config.example.yaml

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
  header: |
    ## f5tui {{ .Tag }}

    Pre-built binaries for Linux, macOS and Windows (amd64 + arm64).
    Verify downloads against `checksums.txt`.
  footer: |
    ---
    Built with [GoReleaser](https://goreleaser.com).
